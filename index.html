<!DOCTYPE html>
<html>
<head>
  <title>Front Page Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #page {
      position: relative;
      width: 794px;   /* A4 width */
      height: 1123px; /* A4 height */
      margin: auto;
      display: none;
    }

    #page img {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .text {
      position: absolute;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Front Page Generator</h2>

<input id="name" placeholder="Enter Name"><br><br>
<input id="roll" placeholder="Enter Roll No"><br><br>

<button onclick="generatePDF()">Download PDF</button>

<!-- TEMPLATE AREA -->
<div id="page">
  <img src="template.png">

  <!-- TEXT POSITIONS (adjust these) -->
  <!-- NAME -->
<div id="t_name" class="text" style="top:618px; left:210px;"></div>
<!-- ROLL NO -->
<div id="t_roll" class="text" style="top:666px; left:210px;"></div>
</div>

<script>
function generatePDF() {
  document.getElementById("t_name").innerText =
    document.getElementById("name").value;

  document.getElementById("t_roll").innerText =
    document.getElementById("roll").value;

  let page = document.getElementById("page");
  page.style.display = "block";

  html2pdf().from(page).save(
    document.getElementById("name").value + "_frontpage.pdf"
  );
}
</script>
<h1> Time pass </h1>
</body>
</html>
